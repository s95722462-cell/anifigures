<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피규어 아카이브 | 시안 확인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent-color: #00ffcc;
            --accent-hover: #00cca3;
            --text-primary: #ffffff;
            --text-secondary: #bbbbbb;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Pretendard', sans-serif;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--accent-color); }

        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(10,10,10,1)), url('https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 1.5rem;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .product-card:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        .image-container { position: relative; aspect-ratio: 1 / 1.2; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }

        .status-badge {
            position: absolute; top: 1rem; left: 1rem;
            padding: 0.4rem 0.8rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 700;
        }
        .status-badge.new { background: var(--accent-color); color: black; }

        .product-info { padding: 1.2rem; }
        .price { font-size: 1.2rem; font-weight: 800; color: var(--accent-color); }

        .footer {
            background: #050505;
            border-top: 1px solid var(--border-color);
            padding: 3rem 1.5rem;
            margin-top: 4rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .hero h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">FIGURE <span>ARCHIVE</span></div>
            <i data-lucide="menu"></i>
        </div>
    </nav>

    <header class="hero">
        <div>
            <h2>일본 정품 피규어 수입 전문</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">프리미엄 피규어 아카이브에 오신 것을 환영합니다.</p>
        </div>
    </header>

    <main class="container">
        <h3 style="margin-bottom: 2rem;">최근 입고 상품</h3>
        <div class="product-grid">
            <div class="product-card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?auto=format&fit=crop&w=800&q=80">
                    <span class="status-badge new">NEW</span>
                </div>
                <div class="product-info">
                    <p style="color: var(--text-secondary); font-size: 0.8rem;">Good Smile Company</p>
                    <h4 style="margin: 0.5rem 0;">하츠네 미쿠 15주년 피규어</h4>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                        <span class="price">₩328,000</span>
                        <div style="border: 1px solid var(--accent-color); color: var(--accent-color); padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem;">문의</div>
                    </div>
                </div>
            </div>
            <!-- 반복... -->
            <div class="product-card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81?auto=format&fit=crop&w=800&q=80">
                    <span class="status-badge new">NEW</span>
                </div>
                <div class="product-info">
                    <p style="color: var(--text-secondary); font-size: 0.8rem;">MAPPA</p>
                    <h4 style="margin: 0.5rem 0;">체인소맨 파워 1/7 스케일</h4>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                        <span class="price">₩245,000</span>
                        <div style="border: 1px solid var(--accent-color); color: var(--accent-color); padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem;">문의</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p style="color: var(--accent-color); font-weight: 700;">FIGURE ARCHIVE</p>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 1rem;">서울특별시 강남구 피규어길 123 | 02-1234-5678</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
